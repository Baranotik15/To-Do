{% extends 'base.html' %}

{% block content %}
  <h2>Delete Tag</h2>
  <p>Are you sure you want to delete "{{ object.name }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'core:tag_list' %}">Cancel</a>
  </form>
{% endblock %}

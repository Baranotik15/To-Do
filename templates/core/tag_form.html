{% extends 'base.html' %}

{% block content %}
  <div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-semibold text-gray-800 mb-6">
      {% if form.instance.pk %}Edit Tag{% else %}Create Tag{% endif %}
    </h2>

    <form method="post" class="bg-gray-50 p-6 rounded-lg shadow-sm">
      {% csrf_token %}
      <div class="space-y-4">
        {{ form.as_p }}
      </div>
      <button type="submit"
              class="mt-6 text-lg font-semibold text-white bg-blue-800 hover:bg-blue-700 transition duration-300 px-4 py-2 rounded-md flex items-center space-x-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-3m-5-9l5 5m0 0l-5 5m5-5H7"></path>
        </svg>
        <span>Save</span>
      </button>
    </form>
  </div>

  <style>
    form p label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    form p input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.375rem;
      background-color: #ffffff;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    form p input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    form p input:hover {
      border-color: #93c5fd;
    }
  </style>
{% endblock %}

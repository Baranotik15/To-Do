{% extends 'base.html' %}

{% block content %}
  <div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-semibold text-gray-800 mb-6">Tag List</h2>

    <table class="w-full bg-gray-50 rounded-lg shadow-sm">
      <thead>
        <tr class="bg-gray-200 text-gray-800">
          <th class="text-lg font-semibold px-4 py-3 text-left rounded-tl-lg">Tag Name</th>
          <th class="text-lg font-semibold px-4 py-3 text-center">Update</th>
          <th class="text-lg font-semibold px-4 py-3 text-center rounded-tr-lg">Delete</th>
        </tr>
      </thead>
      <tbody>
        {% for tag in tag_list %}
          <tr class="border-t border-gray-200">
            <td class="px-4 py-3 text-gray-800">{{ tag.name }}</td>
            <td class="px-4 py-3 text-center">
              <a href="{% url 'core:tag_update' tag.pk %}"
                 class="text-sm font-semibold text-blue-600 hover:text-blue-400 transition duration-300 px-3 py-1 rounded-md hover:bg-blue-50 flex items-center space-x-1 justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15.828a1 1 0 01-.707.293h-3a1 1 0 01-1-1v-3a1 1 0 01.293-.707l8.586-8.586z"></path>
                </svg>
                <span>Edit</span>
              </a>
            </td>
            <td class="px-4 py-3 text-center">
              <a href="{% url 'core:tag_delete' tag.pk %}"
                 class="text-sm font-semibold text-red-600 hover:text-red-400 transition duration-300 px-3 py-1 rounded-md hover:bg-red-50 flex items-center space-x-1 justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
                <span>Delete</span>
              </a>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="{% url 'core:tag_create' %}" class="inline-block mt-6">
      <button type="button"
              class="text-lg font-semibold text-white bg-blue-800 hover:bg-blue-700 transition duration-300 px-4 py-2 rounded-md flex items-center space-x-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        <span>Add Tag</span>
      </button>
    </a>
  </div>
{% endblock %}

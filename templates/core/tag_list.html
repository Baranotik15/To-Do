{% extends 'base.html' %}

{% block content %}
  <table>
    <thead>
    <tr>
      <th>Tag Name</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    {% for tag in tag_list %}
      <tr>
        <td>{{ tag.name }}</td>
        <td>
          <a href="{% url 'core:tag_update' tag.pk %}">Edit</a> |
          <a href="{% url 'core:tag_delete' tag.pk %}">Delete</a>
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>

  <a href="{% url 'core:tag_create' %}" class="btn btn-primary">+ Add Tag</a>

{% endblock %}

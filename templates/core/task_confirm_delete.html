{% extends 'base.html' %}

{% block content %}
  <div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-semibold text-gray-800 mb-6">Delete Task</h2>

    <div class="bg-gray-50 p-6 rounded-lg shadow-sm">
      <p class="text-lg text-gray-700 mb-6 text-center">
        Are you sure you want to delete "<span class="font-semibold text-gray-900">{{ object.content }}</span>"?
      </p>

      <form method="post" class="flex justify-center space-x-6">
        {% csrf_token %}
        <button type="submit"
                class="text-lg font-semibold text-white bg-red-600 hover:bg-red-500 transition duration-300 px-4 py-2 rounded-md flex items-center space-x-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          <span>Yes, delete</span>
        </button>
        <a href="{% url 'core:home' %}"
           class="text-lg font-semibold text-blue-600 hover:text-blue-400 transition duration-300 px-4 py-2 rounded-md flex items-center space-x-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          <span>Cancel</span>
        </a>
      </form>
    </div>
  </div>

  <style>
    form p label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    form p input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.375rem;
      background-color: #ffffff;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    form p input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
  </style>
{% endblock %}
